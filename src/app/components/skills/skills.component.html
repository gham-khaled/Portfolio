<div class="container background px-0 mt-5 pt-5">
  <div class="row mx-0 d-flex justify-content-center w-100">
    <div class="col-12 title text-center">Technical Skills</div>
    <div class="col-12 col-sm-6 mt-3 text-center description">
      Overview of my versatile skillset
    </div>
  </div>

  <div class="skills-grid mt-5">
    <mat-card class="skill-card" *ngFor="let category of categories">
      <mat-card-header class="card-header">
        <mat-icon class="category-icon">{{ category.icon }}</mat-icon>
        <mat-card-title class="category-title">{{ category.name }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="skill-item" *ngFor="let skill of category.skills">
          <img [src]="skill.image" [alt]="skill.name" class="skill-image" />
          <span class="skill-name">{{ skill.name }}</span>
          <div class="proficiency">
            <span
              *ngFor="let d of dots"
              class="proficiency-dot"
              [class.filled]="d <= skill.level"
            ></span>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
